<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Платонові тіла</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
    }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
      z-index: 1;
      max-width: 300px;
    }
    canvas {
      display: block;
    }
    select {
      font-size: 16px;
      padding: 5px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      margin-top: 5px;
      width: 100%;
    }
    #description {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.4em;
    }
  </style>
</head>
<body>
  <div id="menu">
    <label for="solid">Оберіть тіло:</label>
    <select id="solid">
      <option value="Tetrahedron">Тетраедр</option>
      <option value="Cube">Куб (Гексаедр)</option>
      <option value="Octahedron">Октаедр</option>
      <option value="Dodecahedron">Додекаедр</option>
      <option value="Icosahedron">Ікосаедр</option>
    </select>
    <div id="description"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const descriptions = {
      Tetrahedron: `
        🔺 **Тетраедр** — має 4 трикутні грані. Це найпростіше платонове тіло, що складається з чотирьох однакових трикутних граней. 
        Всі грані однакові за розміром і формою, а всі кути між гранями рівні. 
        Тетраедр часто використовується у кристалографії та молекулярній геометрії. 
        Наприклад, молекула метану (CH₄) має тетраедричну структуру.
      `,
      Cube: `
        🟦 **Куб (гексаедр)** — має 6 квадратних граней, що з'єднані між собою прямими кутами. 
        Це класичний приклад об'єму, який використовується для моделювання просторових об'єктів. 
        Куб симетричний і має 8 вершин і 12 ребер. Він часто використовується в геометрії та 3D-моделюванні.
        Відомий як основний об'єкт у багатьох комп'ютерних іграх та моделях.
      `,
      Octahedron: `
        🔶 **Октаедр** — має 8 рівних трикутних граней. Це тіло, яке можна уявити як дві піраміди, з'єднані основами. 
        Октаедр має 6 вершин і 12 ребер. 
        Часто використовується в кристалографії та хімії для моделювання молекул. 
        Наприклад, молекула фторидної кислоти має структуру октаедра.
      `,
      Dodecahedron: `
        ⬟ **Додекаедр** — має 12 п’ятикутних граней. Це більш складне платонове тіло, яке має 20 вершин та 30 ребер.
        Додекаедр є одним із найгармонійніших багатогранників і зустрічається в природі, зокрема в кристалах.
        Відомий також в історії як символ удачі та гармонії в різних культурах.
      `,
      Icosahedron: `
        🔷 **Ікосаедр** — має 20 рівних трикутних граней. Це одне з найбільших платонових тіл з найбільшою кількістю граней.
        Ікосаедр має 12 вершин і 30 ребер. Часто зустрічається в природі, зокрема в структурі вірусів, кристалів та молекул.
        Цей багатогранник також має численні симетрії, що робить його важливим об'єктом у математичних та фізичних дослідженнях.
      `
    };

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10, 10, 10);
    scene.add(light);

    let mesh;

    function createGeometry(type) {
      switch (type) {
        case 'Tetrahedron': return new THREE.TetrahedronGeometry(1);
        case 'Cube': return new THREE.BoxGeometry(1, 1, 1);
        case 'Octahedron': return new THREE.OctahedronGeometry(1);
        case 'Dodecahedron': return new THREE.DodecahedronGeometry(1);
        case 'Icosahedron': return new THREE.IcosahedronGeometry(1);
      }
    }

    function addMesh(type) {
      if (mesh) scene.remove(mesh);
      const geometry = createGeometry(type);
      const material = new THREE.MeshNormalMaterial({ flatShading: true });
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
      document.getElementById("description").innerText = descriptions[type];
    }

    document.getElementById("solid").addEventListener("change", (e) => {
      addMesh(e.target.value);
    });

    addMesh("Tetrahedron");

    function animate() {
      requestAnimationFrame(animate);
      if (mesh) mesh.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
