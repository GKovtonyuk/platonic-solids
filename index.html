<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Платонові тіла</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #111; color: #fff; }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      z-index: 1;
    }
    canvas { display: block; }
    select {
      font-size: 16px;
      padding: 5px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="menu">
    <label for="solid">Оберіть тіло:</label>
    <select id="solid">
      <option value="Tetrahedron">Тетраедр</option>
      <option value="Cube">Куб</option>
      <option value="Octahedron">Октаедр</option>
      <option value="Dodecahedron">Додекаедр</option>
      <option value="Icosahedron">Ікосаедр</option>
    </select>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 3;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10, 10, 10);
    scene.add(light);

    let mesh;

    function createGeometry(type) {
      switch (type) {
        case 'Tetrahedron': return new THREE.TetrahedronGeometry(1);
        case 'Cube': return new THREE.BoxGeometry(1, 1, 1);
        case 'Octahedron': return new THREE.OctahedronGeometry(1);
        case 'Dodecahedron': return new THREE.DodecahedronGeometry(1);
        case 'Icosahedron': return new THREE.IcosahedronGeometry(1);
      }
    }

    function addMesh(type) {
      if (mesh) scene.remove(mesh);
      const geometry = createGeometry(type);
      const material = new THREE.MeshNormalMaterial({ flatShading: true });
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
    }

    document.getElementById("solid").addEventListener("change", (e) => {
      addMesh(e.target.value);
    });

    addMesh("Tetrahedron"); // стартова фігура

    function animate() {
      requestAnimationFrame(animate);
      mesh.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
