<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platonic Lab</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="ui">
    <div class="title">🧊 Platonic Lab</div>
    <div class="subtitle">Інтерактивна 3D-лабораторія</div>

    <div id="buttons">
      <button id="menuToggle">☰ Меню</button>
      <button data-type="Tetrahedron">Тетраедр</button>
      <button data-type="Cube">Куб</button>
      <button data-type="Octahedron">Октаедр</button>
      <button data-type="Dodecahedron">Додекаедр</button>
      <button data-type="Icosahedron">Ікосаедр</button>
    </div>

    <div id="description"></div>
  </div>

  <div id="canvas-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
